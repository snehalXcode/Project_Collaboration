<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Integrated NGO Platform{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-content">
        <div class="logo">Animal Rescue NGO</div>
        <nav class="nav-links">
          <a href="{{ url_for('index') }}">Home</a>
          <a href="{{ url_for('dashboard') }}">NGO Dashboard</a>
          <a href="{{ url_for('adoption_list') }}">Adopt</a>
          <a href="{{ url_for('donate_page') }}">Donate</a>
        </nav>
      </div>
    </header>

    <main class="site-main">
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; {{ 2026 }} Integrated NGO Platform for Animal Rescue</p>
      </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
